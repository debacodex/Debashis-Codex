name: Android Release Build

on:
  push:
    branches:
      - main # Or whatever your main development branch is
    tags:
      - 'v*' # Trigger on tags like v1.0.0, v1.0.1, etc. (for releases)

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11' # Or your project's Java version
           cache: gradle
      
      - name: Build Release APK
        env:
          KEYSTORE_PATH: app/my-release-key.jks # Path where the decoded keystore will be
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      - name: assembleRelease with Gradle
        run: |
          ./gradlew assembleRelease

      - name: Upload Release APK to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v') # Only run if a tag is pushed
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk # Adjust path if necessary
          # For more advanced release notes, you can generate them dynamically
          body: |
            ## Release Notes for ${{ github.ref_name }}

            This release includes:
            * Bug fixes
            * Performance improvements
            * New features

      - name: Upload APK as Artifact (for testing/internal use)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
